<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Adventure Pilot</title>
    <meta name="theme-color" content="#0b7667">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#setup" aria-label="Daily Adventure Pilot home">
          <span class="brand-mark">DA</span>
          <span>
            <strong>Daily Adventure</strong>
            <small>Pilot</small>
          </span>
        </a>
        <nav aria-label="Pilot navigation">
          <a href="#setup" data-nav="setup">Family Setup</a>
          <a href="#child" data-nav="child">Child App</a>
          <a href="#parent" data-nav="parent">Parent Dashboard</a>
          <a href="#admin" data-nav="admin">Pilot Admin</a>
        </nav>
      </header>

      <main id="app" tabindex="-1"></main>
    </div>

    <template id="setup-view">
      <section class="hero">
        <div>
          <p class="eyebrow">Pilot onboarding</p>
          <h1>Set up a family in minutes.</h1>
          <p class="lead">Parents should not need GitHub, Google Apps Script, or code. This flow creates a simple family profile and prepares the child and parent views.</p>
        </div>
        <div class="hero-card">
          <strong>Parent promise</strong>
          <p>Clear setup, parent-controlled data, and no public sharing of child responses.</p>
        </div>
      </section>

      <section class="panel">
        <form id="family-form" class="setup-form">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Step 1</p>
              <h2>Family profile</h2>
            </div>
            <span class="status-pill">Demo storage</span>
          </div>

          <div class="form-grid">
            <label>
              Parent name
              <input id="parentName" name="parentName" autocomplete="name" required placeholder="Example: Rehan">
            </label>
            <label>
              Parent email
              <input id="parentEmail" name="parentEmail" type="email" autocomplete="email" placeholder="Optional for pilot">
            </label>
            <label>
              Child first name
              <input id="childName" name="childName" required placeholder="Example: Alex">
            </label>
            <label>
              Age range
              <select id="ageRange" name="ageRange">
                <option>8-12</option>
                <option>13-17</option>
                <option selected>18-25</option>
                <option>26+</option>
              </select>
            </label>
            <label>
              Parent PIN
              <input id="familyPin" name="familyPin" inputmode="numeric" maxlength="8" required placeholder="4-8 digits">
            </label>
            <label>
              Voice style
              <select id="voiceStyle" name="voiceStyle">
                <option value="playful_hype">Cool playful hype coach</option>
                <option value="calm">Calm support coach</option>
                <option value="travel">Travel adventure</option>
                <option value="business">Business builder</option>
              </select>
            </label>
          </div>

          <fieldset>
            <legend>Learning goals</legend>
            <div class="choice-grid">
              <label><input type="checkbox" name="goals" value="Talk Time" checked> Talk Time</label>
              <label><input type="checkbox" name="goals" value="Money Math" checked> Money Math</label>
              <label><input type="checkbox" name="goals" value="Language Cards"> Language Cards</label>
              <label><input type="checkbox" name="goals" value="Family Words" checked> Family Words</label>
              <label><input type="checkbox" name="goals" value="Daily Routine"> Daily Routine</label>
              <label><input type="checkbox" name="goals" value="Memory"> Memory</label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Child interests</legend>
            <div class="choice-grid">
              <label><input type="checkbox" name="interests" value="Travel"> Travel</label>
              <label><input type="checkbox" name="interests" value="Exercise"> Exercise</label>
              <label><input type="checkbox" name="interests" value="Business"> Business</label>
              <label><input type="checkbox" name="interests" value="Music"> Music</label>
              <label><input type="checkbox" name="interests" value="Food"> Food</label>
              <label><input type="checkbox" name="interests" value="Family"> Family</label>
            </div>
          </fieldset>

          <label class="consent-box">
            <input id="consentAccepted" name="consentAccepted" type="checkbox" required>
            <span>I understand this is a family learning pilot, not medical or therapy advice. I control whether my child's responses are shared.</span>
          </label>

          <button class="primary-action" type="submit">Create family setup</button>
        </form>
      </section>
    </template>

    <template id="child-view">
      <section class="hero compact-hero">
        <div>
          <p class="eyebrow" id="childFamilyLabel">Daily Adventure</p>
          <h1 id="childGreeting">Choose a family to begin.</h1>
          <p class="lead" id="childIntro">Short, friendly practice that meets each student where they are.</p>
        </div>
        <div class="hero-card">
          <strong id="roundCount">0 of 8</strong>
          <p>rounds complete today</p>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Child app</p>
            <h2>Today's path</h2>
          </div>
          <select id="familySelectChild" aria-label="Choose family"></select>
        </div>
        <div class="progress-track"><span id="progressBar"></span></div>
        <div class="activity-grid" id="activityGrid"></div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Talk Time</p>
            <h2>Share an answer</h2>
          </div>
        </div>
        <p id="talkPrompt" class="prompt">What is one thing you want to do today?</p>
        <textarea id="talkResponse" rows="4" placeholder="Type or dictate an answer here."></textarea>
        <button id="saveTalkTime" class="secondary-action" type="button">Save Talk Time</button>
      </section>
    </template>

    <template id="parent-view">
      <section class="hero compact-hero">
        <div>
          <p class="eyebrow">Parent Dashboard</p>
          <h1>See progress without setup headaches.</h1>
          <p class="lead">This dashboard summarizes daily work, Talk Time, and what to practice next.</p>
        </div>
        <div class="hero-card">
          <strong id="parentScore">0%</strong>
          <p>today's progress</p>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Family</p>
            <h2>Progress view</h2>
          </div>
          <select id="familySelectParent" aria-label="Choose family"></select>
        </div>
        <div id="parentDashboard"></div>
      </section>
    </template>

    <template id="admin-view">
      <section class="hero compact-hero">
        <div>
          <p class="eyebrow">Pilot Admin</p>
          <h1>Manage the small pilot.</h1>
          <p class="lead">Track participating families, recent activity, and export pilot data.</p>
        </div>
        <div class="hero-card">
          <strong id="familyCount">0</strong>
          <p>families in pilot</p>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Admin</p>
            <h2>Family list</h2>
          </div>
          <button id="exportPilotData" class="secondary-action" type="button">Export JSON</button>
        </div>
        <div id="adminList"></div>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
