<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Adventure Pilot</title>
    <meta name="theme-color" content="#0b7667">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Daily Adventure">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#child" aria-label="Daily Adventure Pilot home">
          <span class="brand-mark">DA</span>
          <span>
            <strong>Daily Adventure</strong>
            <small>Pilot</small>
          </span>
        </a>
        <div class="topbar-actions">
          <a id="modeSwitch" class="parent-link" href="#parent-access" data-nav="parent-access">Parent</a>
        </div>
      </header>

      <main id="app" tabindex="-1"></main>
    </div>

    <template id="setup-view">
      <section class="hero">
        <div>
          <p class="eyebrow">Family pilot</p>
          <h1>Create your learner's daily adventure.</h1>
          <p class="lead">Choose a few goals and interests, then Daily Adventure creates a short daily path that feels personal, encouraging, and easy to try.</p>
        </div>
        <div class="hero-card">
          <strong>Parent promise</strong>
          <p>Parent-controlled data, clear consent, and no public sharing of learner responses.</p>
        </div>
      </section>

      <section class="panel save-phone-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Save to phone</p>
            <h2>Add Daily Adventure to the home screen</h2>
          </div>
          <span class="status-pill">iPhone friendly</span>
        </div>
        <ol class="step-list">
          <li>Open this app in Safari on iPhone.</li>
          <li>Tap the Share button.</li>
          <li>Tap <strong>Add to Home Screen</strong>.</li>
          <li>Tap <strong>Add</strong>.</li>
        </ol>
        <p class="helper-text">After this, Daily Adventure opens from the home screen like a simple app.</p>
      </section>

      <section class="panel">
        <form id="family-form" class="setup-form">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Step 1</p>
              <h2>Family profile</h2>
            </div>
            <span class="status-pill">Demo storage</span>
          </div>

          <div class="form-grid">
            <label>
              Parent name
              <input id="parentName" name="parentName" autocomplete="name" required placeholder="Example: Rehan">
            </label>
            <label>
              Parent email
              <input id="parentEmail" name="parentEmail" type="email" autocomplete="email" placeholder="Optional for pilot">
            </label>
            <label>
              Learner first name
              <input id="childName" name="childName" required placeholder="Example: Alex">
            </label>
            <label>
              Age range
              <select id="ageRange" name="ageRange">
                <option>8-12</option>
                <option>13-17</option>
                <option selected>18-25</option>
                <option>26+</option>
              </select>
            </label>
            <label>
              Starting level
              <select id="startingLevel" name="startingLevel">
                <option value="beginner">Beginner: short and concrete</option>
                <option value="growing" selected>Growing: a little more thinking</option>
                <option value="confident">Confident: more independent</option>
              </select>
            </label>
            <label>
              Parent PIN
              <input id="familyPin" name="familyPin" inputmode="numeric" maxlength="8" required placeholder="4-8 digits">
            </label>
            <label>
              Voice style
              <select id="voiceStyle" name="voiceStyle">
                <option value="playful_hype">Cool playful hype coach</option>
                <option value="calm">Calm support coach</option>
                <option value="travel">Travel adventure</option>
                <option value="business">Business builder</option>
              </select>
            </label>
            <label>
              Voice prompts
              <select id="voiceEnabled" name="voiceEnabled">
                <option value="true" selected>On</option>
                <option value="false">Off</option>
              </select>
            </label>
          </div>

          <fieldset>
            <legend>Learning goals</legend>
            <div class="choice-grid">
              <label><input type="checkbox" name="goals" value="Talk Time" checked> Talk Time</label>
              <label><input type="checkbox" name="goals" value="Money Math" checked> Money Math</label>
              <label><input type="checkbox" name="goals" value="Language Cards"> Language Cards</label>
              <label><input type="checkbox" name="goals" value="Family Words" checked> Family Words</label>
              <label><input type="checkbox" name="goals" value="Daily Routine"> Daily Routine</label>
              <label><input type="checkbox" name="goals" value="Memory"> Memory</label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Learner interests</legend>
            <div class="choice-grid">
              <label><input type="checkbox" name="interests" value="Travel"> Travel</label>
              <label><input type="checkbox" name="interests" value="Exercise"> Exercise</label>
              <label><input type="checkbox" name="interests" value="Business"> Business</label>
              <label><input type="checkbox" name="interests" value="Music"> Music</label>
              <label><input type="checkbox" name="interests" value="Food"> Food</label>
              <label><input type="checkbox" name="interests" value="Family"> Family</label>
            </div>
          </fieldset>

          <label class="consent-box">
            <input id="consentAccepted" name="consentAccepted" type="checkbox" required>
            <span>I understand this is a family learning pilot, not medical or therapy advice. I can stop using it anytime. My learner's responses are used only to support learning and pilot feedback, and are not shared publicly.</span>
          </label>

          <button class="primary-action" type="submit">Create family setup</button>
        </form>
      </section>
    </template>

    <template id="parent-access-view">
      <section class="hero compact-hero">
        <div>
          <p class="eyebrow">Parent area</p>
          <h1>Adult tools are tucked away.</h1>
          <p class="lead">Enter the Parent PIN to open setup, dashboard, feedback, and admin tools.</p>
        </div>
        <div class="hero-card">
          <strong>Learner-first</strong>
          <p>The daily learning screen stays simple and focused.</p>
        </div>
      </section>

      <section class="panel parent-lock-panel">
        <form id="parent-pin-form" class="parent-pin-form">
          <label>
            Parent PIN
            <input id="parentPinEntry" name="parentPinEntry" inputmode="numeric" maxlength="8" required placeholder="Enter PIN">
          </label>
          <button class="primary-action" type="submit">Open parent area</button>
        </form>
      </section>
    </template>

    <template id="parent-menu-view">
      <section class="hero compact-hero">
        <div>
          <p class="eyebrow">Parent area</p>
          <h1>Choose what you need.</h1>
          <p class="lead">These tools stay behind the Parent PIN so the learner experience remains calm and focused.</p>
        </div>
        <div class="hero-card">
          <strong>Unlocked</strong>
          <p>Use Learner in the top bar to return, or Lock when you are done.</p>
        </div>
      </section>

      <section class="panel">
        <div class="parent-menu-grid">
          <a class="menu-card" href="#parent">
            <small>Progress</small>
            <strong>Parent Dashboard</strong>
            <span>See attempts, Talk Time, and practice areas.</span>
          </a>
          <a class="menu-card" href="#setup">
            <small>Setup</small>
            <strong>Add family setup</strong>
            <span>Create another test family or update pilot setup flow.</span>
          </a>
          <a class="menu-card" href="#admin">
            <small>Pilot</small>
            <strong>Pilot Admin</strong>
            <span>View families, feedback counts, and export data.</span>
          </a>
          <button id="lockParentArea" class="menu-card button-card" type="button">
            <small>Privacy</small>
            <strong>Lock parent area</strong>
            <span>Return to the learner app.</span>
          </button>
        </div>
      </section>
    </template>

    <template id="child-view">
      <section class="hero compact-hero">
        <div>
          <p class="eyebrow" id="childFamilyLabel">Daily Adventure</p>
          <h1 id="childGreeting">Choose a learner to begin.</h1>
          <p class="lead" id="childIntro">Short, friendly practice that meets each learner where they are.</p>
        </div>
        <div class="hero-card">
          <strong id="roundCount">0 of 8</strong>
          <p>rounds complete today</p>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Learner app</p>
            <h2>Today's path</h2>
          </div>
          <div class="toolbar-actions">
            <button id="voiceToggle" class="secondary-action" type="button">Voice on</button>
          </div>
        </div>
        <div class="progress-track"><span id="progressBar"></span></div>
        <div class="activity-grid" id="activityGrid"></div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Talk Time</p>
            <h2>Share an answer</h2>
          </div>
        </div>
        <p id="talkPrompt" class="prompt">What is one thing you want to do today?</p>
        <textarea id="talkResponse" rows="4" placeholder="Type or dictate an answer here."></textarea>
        <button id="saveTalkTime" class="secondary-action" type="button">Save Talk Time</button>
      </section>
    </template>

    <template id="parent-view">
      <section class="hero compact-hero">
        <div>
          <p class="eyebrow">Parent Dashboard</p>
          <h1>See progress without setup headaches.</h1>
          <p class="lead">This dashboard summarizes daily work, Talk Time, and what to practice next.</p>
        </div>
        <div class="hero-card">
          <strong id="parentScore">0%</strong>
          <p>today's progress</p>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Family</p>
            <h2>Progress view</h2>
          </div>
          <select id="familySelectParent" aria-label="Choose family"></select>
        </div>
        <div id="parentDashboard"></div>
      </section>
    </template>

    <template id="admin-view">
      <section class="hero compact-hero">
        <div>
          <p class="eyebrow">Pilot Admin</p>
          <h1>Manage the small pilot.</h1>
          <p class="lead">Track participating families, recent activity, and export pilot data.</p>
        </div>
        <div class="hero-card">
          <strong id="familyCount">0</strong>
          <p>families in pilot</p>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Admin</p>
            <h2>Family list</h2>
          </div>
          <button id="exportPilotData" class="secondary-action" type="button">Export JSON</button>
        </div>
        <div id="adminList"></div>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
